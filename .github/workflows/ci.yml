name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hush:ci .
      - name: Smoke test
        run: |
          docker run -d --name hush -p 4874:4874 -v hush-ci:/data hush:ci
          sh scripts/smoke.sh
      - name: Server logs on failure
        if: failure()
        run: docker logs hush
