# Host-networking deployment for device discovery.
#
# The default docker-compose.yml puts Hush on a Docker bridge network,
# where the device poller can only see other containers. To discover and
# authenticate real machines on your LAN, Hush must share the host's
# network stack.
#
#   docker compose -f docker-compose.host.yml up -d --build
#
# Linux hosts: this works out of the box.
# Docker Desktop (Windows/Mac): also requires WSL mirrored networking
#   (networkingMode=mirrored in ~/.wslconfig) and Docker Desktop host
#   networking enabled. See docs/DEPLOY.md.
#
# With host networking there is no port mapping: Hush binds directly to
# HUSH_LISTEN (default :4874) on the host.
services:
  hush:
    build: .
    image: hush:dev
    container_name: hush
    network_mode: host
    volumes:
      - hush-data:/data
    environment:
      # Your LAN subnet, like 192.168.1.0/24. The install script detects this
      # automatically; set it here (or in the environment) to run by hand.
      # Empty disables device discovery. A host-form value like
      # 192.168.5.124/22 is fine - Hush computes the network from it.
      - HUSH_NETWORK_CIDR=${HUSH_NETWORK_CIDR:-}
      - HUSH_POLL_INTERVAL=${HUSH_POLL_INTERVAL:-5m}
      # Change if :4874 collides with something on the host.
      - HUSH_LISTEN=${HUSH_LISTEN:-:4874}
    restart: unless-stopped

volumes:
  hush-data:
